<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Instrumentos - BandSync</title>

    <link
            rel="stylesheet"
            href="../css/styles.css"
    >

</head>

<body>

<script src="../js/api.js"></script>

<script src="../js/navbar.js"></script>

<script src="../js/instrumentos.js"></script>

<div id="navbarContainer"></div>

<div class="page-wrapper">

    <div class="page-header">

        <h2>Instrumentos</h2>

        <p>
            Controlá el inventario de instrumentos de la banda
        </p>

    </div>

    <div class="search-bar">

        <input
                type="text"
                id="buscarInstrumento"
                placeholder="Buscar por nombre..."
        >

        <button
                class="btn-secondary"
                onclick="buscarInstrumentoPorNombre()"
        >
            🔍 Buscar
        </button>

        <button
                id="btnNuevoInstrumento"
                class="btn-gold"
                onclick="abrirModal()"
        >
            + Agregar instrumento
        </button>

    </div>

    <div class="card">

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>

                    <th>#</th>

                    <th>NOMBRE</th>

                    <th>CANTIDAD</th>

                    <th>ACCIONES</th>

                </tr>

                </thead>

                <tbody id="instrumentosBody">

                <tr>

                    <td colspan="4">

                        <div class="spinner">
                            Cargando...
                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<div
        class="modal-overlay hidden"
        id="instModal"
>

    <div class="modal">

        <div class="modal-header">

            <h3 id="instModalTitle">

                Nuevo Instrumento

            </h3>

            <button
                    class="modal-close"
                    onclick="cerrarModal()"
            >
                ×
            </button>

        </div>

        <form id="instForm">

            <div class="form-group">

                <label>

                    Nombre del instrumento

                </label>

                <input
                        type="text"
                        id="inpNombreInstrumento"
                        required
                >

            </div>

            <div class="form-group">

                <label>

                    Cantidad

                </label>

                <input
                        type="number"
                        id="inpCantidad"
                        min="0"
                        required
                >

            </div>

        </form>

        <div class="modal-footer">

            <button
                    class="btn-secondary"
                    onclick="cerrarModal()"
            >
                Cancelar
            </button>

            <button
                    class="btn-primary"
                    onclick="guardarInstrumento()"
            >
                Guardar
            </button>

        </div>

    </div>

</div>

</body>

</html>
