<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instrumentos – BandSync BCO</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>

<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script>
  requireAuth();
  document.addEventListener("DOMContentLoaded", () => injectNavbar("instrumentos"));
</script>

<div class="page-wrapper">
  <div class="page-header">
    <h2>Instrumentos</h2>
    <p>Controlá el inventario de instrumentos de la banda</p>
  </div>

  <div class="search-bar">
    <input type="text" id="buscarInst" placeholder="Buscar por nombre…"/>
    <button class="btn-secondary btn-sm" onclick="cargarInst()">🔍 Buscar</button>
    <button class="btn-gold" onclick="abrirModal()">+ Agregar instrumento</button>
  </div>

  <div id="alertaInst"></div>

  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Nombre</th><th>Cantidad</th><th>Descripción</th><th>Acciones</th></tr>
        </thead>
        <tbody id="instBody">
          <tr><td colspan="5"><div class="spinner">Cargando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="instModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="instModalTitle">Nuevo Instrumento</h3>
      <button class="modal-close" onclick="cerrarModal()">×</button>
    </div>
    <form id="instForm">
      <div class="form-group">
        <label>Nombre del instrumento</label>
        <input type="text" id="inpInstNombre" required placeholder="Ej: Trompeta"/>
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="inpInstCant" required min="1" placeholder="1"/>
      </div>
      <div class="form-group">
        <label>Descripción (opcional)</label>
        <textarea id="inpInstDesc" rows="3" placeholder="Notas adicionales…" style="resize:vertical"></textarea>
      </div>
      <div id="instFormError" class="error-msg hidden"></div>
    </form>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary"   onclick="guardarInst()" id="btnGuardarInst">Guardar</button>
    </div>
  </div>
</div>

<script>
  let instrumentos = [];
  let editingId = null;

  async function cargarInst() {
    const nombre = document.getElementById("buscarInst").value.trim();
    document.getElementById("instBody").innerHTML =
      `<tr><td colspan="5"><div class="spinner">Cargando...</div></td></tr>`;
    try {
      let url = "/api/instrumentos";
      if (nombre) url = `/api/instrumentos/name/${encodeURIComponent(nombre)}`;
      const data = await apiFetch(url);
      instrumentos = Array.isArray(data) ? data : [data];
      renderTabla();
    } catch(e) {
      document.getElementById("instBody").innerHTML =
        `<tr><td colspan="5" style="padding:1rem;color:var(--rojo)">${e.message}</td></tr>`;
    }
  }

  function renderTabla() {
    const tbody = document.getElementById("instBody");
    if (!instrumentos.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="padding:1.5rem;text-align:center;color:var(--texto-suave)">No hay instrumentos registrados</td></tr>`;
      return;
    }
    tbody.innerHTML = instrumentos.map((inst, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${inst.name || inst.nombre}</strong></td>
        <td><span class="badge" style="background:var(--gris-bg);color:var(--marino)">${inst.quantity || inst.cantidad || 1}</span></td>
        <td>${inst.description || inst.descripcion || "—"}</td>
        <td style="display:flex;gap:0.4rem">
          <button class="btn-secondary btn-sm" onclick="editarInst(${inst.id})">✏ Editar</button>
          <button class="btn-danger btn-sm"    onclick="eliminarInst(${inst.id}, ${inst.quantity || 1})">🗑</button>
        </td>
      </tr>
    `).join("");
  }

  function abrirModal(id) {
    editingId = id || null;
    document.getElementById("instModalTitle").textContent = id ? "Editar Instrumento" : "Nuevo Instrumento";
    document.getElementById("instFormError").classList.add("hidden");
    if (id) {
      const inst = instrumentos.find(x => x.id === id);
      document.getElementById("inpInstNombre").value = inst.name || inst.nombre || "";
      document.getElementById("inpInstCant").value   = inst.quantity || inst.cantidad || 1;
      document.getElementById("inpInstDesc").value   = inst.description || inst.descripcion || "";
    } else {
      document.getElementById("instForm").reset();
    }
    document.getElementById("instModal").classList.remove("hidden");
  }

  function editarInst(id) { abrirModal(id); }
  function cerrarModal() { document.getElementById("instModal").classList.add("hidden"); editingId = null; }

  async function guardarInst() {
    const btn = document.getElementById("btnGuardarInst");
    const err = document.getElementById("instFormError");
    err.classList.add("hidden");
    btn.textContent = "Guardando..."; btn.disabled = true;

    const nombre = document.getElementById("inpInstNombre").value.trim();
    const cant   = parseInt(document.getElementById("inpInstCant").value);
    const desc   = document.getElementById("inpInstDesc").value.trim();

    const body = { name: nombre, quantity: cant, description: desc };

    try {
      if (editingId) {
        await apiFetch(`/api/instrumentos/${editingId}`, { method: "PUT", body: JSON.stringify(body) });
      } else {
        await apiFetch("/api/instrumentos", { method: "POST", body: JSON.stringify(body) });
      }
      cerrarModal();
      mostrarAlerta("Instrumento guardado ✓", "success");
      cargarInst();
    } catch(e) {
      err.textContent = e.message; err.classList.remove("hidden");
    }
    btn.textContent = "Guardar"; btn.disabled = false;
  }

  async function eliminarInst(id, qty) {
    if (!confirm("¿Eliminar este instrumento?")) return;
    try {
      await apiFetch(`/api/instrumentos/${id}/${qty}`, { method: "DELETE" });
      mostrarAlerta("Instrumento eliminado ✓", "success");
      cargarInst();
    } catch(e) { mostrarAlerta(e.message, "error"); }
  }

  function mostrarAlerta(msg, tipo) {
    const el = document.getElementById("alertaInst");
    el.className = tipo === "success" ? "success-msg" : "error-msg";
    el.textContent = msg;
    setTimeout(() => el.className = "", 3500);
  }

  cargarInst();
</script>
</body>
</html>
