<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0">

    <title>
        Presentaciones - BandSync BCO
    </title>

    <link
            rel="stylesheet"
            href="../css/styles.css">

</head>

<body>

<div class="page-wrapper">

    <div class="page-header">

        <h2>
            Presentaciones
        </h2>

        <p>
            Administración de presentaciones
        </p>

    </div>

    <div class="search-bar">

        <input
                type="text"
                id="buscarUbicacion"
                placeholder="Buscar por ubicación">

        <button
                class="btn-secondary btn-sm"
                onclick="cargarPresentaciones()">

            🔍 Buscar

        </button>

        <button
                class="btn-gold"
                id="btnNuevaPresentacion">

            + Nueva Presentación

        </button>

    </div>

    <div id="alertaPres"></div>

    <div class="card">

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Ubicación</th>
                    <th>Integrante</th>
                    <th>Asistencia</th>
                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody id="presentacionesBody">

                <tr>

                    <td colspan="6">

                        <div class="spinner">
                            Cargando presentaciones...
                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- MODAL -->

<div
        class="modal-overlay hidden"
        id="presModal">

    <div class="modal">

        <div class="modal-header">

            <h3 id="presModalTitle">
                Nueva Presentación
            </h3>

            <button
                    class="modal-close"
                    onclick="cerrarModal()">

                ×

            </button>

        </div>

        <form id="presForm">

            <div class="form-group">

                <label>
                    Fecha
                </label>

                <input
                        type="datetime-local"
                        id="inpFecha"
                        required>

            </div>

            <div class="form-group">

                <label>
                    Ubicación
                </label>

                <input
                        type="text"
                        id="inpUbicacion"
                        required>

            </div>

        </form>

        <div class="modal-footer">

            <button
                    class="btn-secondary"
                    onclick="cerrarModal()">

                Cancelar

            </button>

            <button
                    class="btn-primary"
                    onclick="guardarPresentacion()">

                Guardar

            </button>

        </div>

    </div>

</div>

<script src="../js/api.js"></script>

<script src="../js/navbar.js"></script>

<script src="../js/presentaciones.js"></script>

</body>
</html>
