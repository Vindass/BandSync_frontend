<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentaciones - BandSync</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/presentaciones.js"></script>

<div class="page-wrapper">

    <div class="page-header">
        <h2>Presentaciones</h2>
        <p>Administración de presentaciones</p>
    </div>

    <div class="search-bar">

        <input
            type="text"
            id="buscarTexto"
            placeholder="Buscar por ID, ubicación o integrante">

        <input
            type="date"
            id="buscarFecha">

        <button class="btn-secondary" onclick="buscarPresentaciones()">
            🔍 Buscar
        </button>

        <button class="btn-gold" id="btnNuevaPresentacion" onclick="abrirModal()">
            + Nueva Presentación
        </button>

    </div>

    <div class="card">

        <div class="table-wrapper">

            <table>

                <thead>
                <tr>
                    <th>ID</th>
                    <th>FECHA</th>
                    <th>UBICACIÓN</th>
                    <th>INTEGRANTE</th>
                    <th>ASISTENCIA</th>
                    <th>ACCIONES</th>
                </tr>
                </thead>

                <tbody id="presentacionesBody">

                <tr>
                    <td colspan="6">Cargando...</td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- MODAL -->

<div class="modal-overlay hidden" id="presModal">

    <div class="modal">

        <div class="modal-header">
            <h3 id="presModalTitle">Nueva Presentación</h3>
            <button onclick="cerrarModal()">×</button>
        </div>

        <form id="presForm">

            <div class="form-group">
                <label>Fecha</label>
                <input type="datetime-local" id="inpFecha" required>
            </div>

            <div class="form-group">
                <label>Ubicación</label>
                <input type="text" id="inpUbicacion" required>
            </div>

        </form>

        <div class="modal-footer">

            <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primary" onclick="guardarPresentacion()">Guardar</button>

        </div>

    </div>

</div>

</body>
</html>
