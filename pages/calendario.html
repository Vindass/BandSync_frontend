<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendario – BandSync BCO</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>

<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>

<div class="page-wrapper">
  <div class="page-header">
    <h2>Calendario de Ensayos</h2>
    <p>Visualizá todos los ensayos de la Banda Comunal de Orotina</p>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">Este mes</div>
      <div class="stat-value" id="statMes">—</div>
    </div>

    <div class="stat-card gold">
      <div class="stat-label">Bronces</div>
      <div class="stat-value" id="statBronces">—</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Maderas</div>
      <div class="stat-value" id="statMaderas">—</div>
    </div>

    <div class="stat-card navy">
      <div class="stat-label">Percusión</div>
      <div class="stat-value" id="statPerc">—</div>
    </div>
  </div>

  <div class="card">
    <div class="cal-nav">
      <div class="cal-nav-btns">
        <button class="btn-secondary btn-sm" id="btnPrev">‹ Anterior</button>
        <button class="btn-secondary btn-sm" id="btnToday">Hoy</button>
        <button class="btn-secondary btn-sm" id="btnNext">Siguiente ›</button>
      </div>

      <h3 id="calTitle"></h3>

      <button
        class="btn-gold btn-sm"
        onclick="window.location.href='ensayos.html'">
        + Nuevo ensayo
      </button>
    </div>

    <div class="calendar-grid" id="calHeader">
      <div class="cal-day-name">Dom</div>
      <div class="cal-day-name">Lun</div>
      <div class="cal-day-name">Mar</div>
      <div class="cal-day-name">Mié</div>
      <div class="cal-day-name">Jue</div>
      <div class="cal-day-name">Vie</div>
      <div class="cal-day-name">Sáb</div>
    </div>

    <div class="calendar-grid" id="calBody">
      <div class="spinner">Cargando calendario...</div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="dayModal">
  <div class="modal">

    <div class="modal-header">
      <h3 id="modalDate">Ensayos del día</h3>

      <button
        class="modal-close"
        id="btnCloseModal">
        ×
      </button>
    </div>

    <div id="modalContent"></div>

    <div class="modal-footer">
      <button
        class="btn-secondary"
        id="btnCerrarModal">
        Cerrar
      </button>
    </div>

  </div>
</div>

</body>
</html>
